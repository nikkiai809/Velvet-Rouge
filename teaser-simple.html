<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>VELVET ROUGE — 11.11.2026</title>
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300&family=Inter:wght@200;300;400&display=swap');

  :root {
    --rouge: #8b1a1a;
    --rouge-light: #c42020;
    --rouge-deep: #5c1010;
    --rouge-glow: rgba(139,26,26,0.2);
    --noir: #050505;
    --noir-soft: #0a0a0a;
    --noir-warm: #0c0808;
    --argent: #c0c0c0;
    --argent-dim: rgba(192,192,192,0.25);
    --blanc: #f0ece4;
    --skin-warm: rgba(220,180,160,0.15);
  }

  html, body {
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: var(--noir);
    -webkit-font-smoothing: antialiased;
  }

  .frame {
    position: relative;
    width: 100vw;
    height: 100vh;
    max-width: 1080px;
    max-height: 1920px;
    margin: 0 auto;
    overflow: hidden;
    background: var(--noir);
  }
  @media (min-aspect-ratio: 9/16) {
    .frame { width: calc(100vh * 9 / 16); height: 100vh; }
  }

  canvas { position: absolute; inset: 0; width: 100%; height: 100%; }
  #scene-canvas  { z-index: 10; }
  #fx-canvas     { z-index: 20; pointer-events: none; }

  /* ─── Film Grain ─── */
  .grain {
    position: fixed; inset: 0; pointer-events: none; z-index: 100;
    opacity: 0.06; mix-blend-mode: overlay;
  }
  .grain::after {
    content: ''; display: block; width: 300%; height: 300%;
    position: absolute; top: -100%; left: -100%;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='1'/%3E%3C/svg%3E");
    background-repeat: repeat; background-size: 256px 256px;
    animation: grain 0.2s steps(2) infinite;
  }
  @keyframes grain {
    0%   { transform: translate(0,0) rotate(0deg); }
    50%  { transform: translate(-6%,4%) rotate(0.5deg); }
    100% { transform: translate(3%,-8%) rotate(-0.3deg); }
  }

  /* ─── Vignette ─── */
  .vignette {
    position: fixed; inset: 0; pointer-events: none; z-index: 90;
    background: radial-gradient(ellipse at center, transparent 35%, rgba(0,0,0,0.85) 100%);
  }

  /* ─── Scanlines ─── */
  .scanlines {
    position: fixed; inset: 0; pointer-events: none; z-index: 95;
    opacity: 0.025;
    background: repeating-linear-gradient(
      0deg,
      transparent, transparent 2px,
      rgba(255,255,255,0.03) 2px, rgba(255,255,255,0.03) 4px
    );
  }

  /* ─── Text overlay ─── */
  .text-overlay {
    position: absolute; inset: 0; z-index: 50; pointer-events: none;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
  }

  .brand-tag {
    position: absolute; top: 48px; left: 0; right: 0; text-align: center;
    font-family: 'Inter', sans-serif; font-weight: 200; font-size: 0.5rem;
    letter-spacing: 8px; text-transform: uppercase; color: var(--argent);
    opacity: 0; transition: opacity 1.5s cubic-bezier(0.22, 1, 0.36, 1);
  }
  .brand-tag.visible { opacity: 0.3; }

  .date-container {
    opacity: 0;
    transition: opacity 1.8s cubic-bezier(0.22, 1, 0.36, 1),
                transform 1.8s cubic-bezier(0.22, 1, 0.36, 1);
    text-align: center;
    transform: translateY(20px) scale(0.97);
  }
  .date-container.visible {
    opacity: 1;
    transform: translateY(0) scale(1);
  }
  .date-main {
    font-family: 'Cormorant Garamond', Georgia, serif;
    font-weight: 300;
    font-size: clamp(4rem, 16vw, 7.5rem);
    letter-spacing: 16px;
    color: var(--rouge-light);
    text-shadow:
      0 0 40px rgba(196,32,32,0.15),
      0 0 80px rgba(139,26,26,0.08),
      0 0 160px rgba(139,26,26,0.04);
    line-height: 1.15;
  }

  .bottom-tag {
    position: absolute; bottom: 36px; left: 0; right: 0; text-align: center;
    font-family: 'Inter', sans-serif; font-weight: 200; font-size: 0.4rem;
    letter-spacing: 5px; text-transform: uppercase; color: var(--argent);
    opacity: 0; transition: opacity 2s ease;
  }
  .bottom-tag.visible { opacity: 0.15; }

  .city-overlay {
    position: absolute; bottom: 80px; right: 32px;
    font-family: 'Inter', sans-serif; font-weight: 200;
    font-size: 0.35rem; letter-spacing: 3px;
    text-transform: uppercase; color: var(--argent);
    opacity: 0; transition: opacity 0.8s ease;
  }
  .city-overlay.visible { opacity: 0.15; }
  .city-overlay.left { right: auto; left: 32px; }

  @media (max-width: 480px) {
    .brand-tag { top: 28px; font-size: 0.4rem; letter-spacing: 5px; }
    .date-main { letter-spacing: 10px; }
    .date-sub { letter-spacing: 8px; margin-top: 12px; }
    .bottom-tag { bottom: 20px; }
  }

  /* ─── Play Overlay ─── */
  .play-overlay {
    position: absolute; inset: 0; z-index: 80;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    background: rgba(5,5,5,0.6);
    cursor: pointer;
    transition: opacity 0.8s ease, visibility 0.8s ease;
    -webkit-tap-highlight-color: transparent;
  }
  .play-overlay.hidden {
    opacity: 0; visibility: hidden; pointer-events: none;
  }
  .play-btn {
    width: 80px; height: 80px; border-radius: 50%;
    border: 1px solid var(--rouge-light);
    background: rgba(139,26,26,0.1);
    backdrop-filter: blur(4px);
    display: flex; align-items: center; justify-content: center;
    transition: all 0.4s cubic-bezier(0.22, 1, 0.36, 1);
    margin-bottom: 20px;
  }
  .play-btn:hover, .play-btn:active {
    background: rgba(139,26,26,0.25);
    transform: scale(1.05);
    border-color: #c42020;
    box-shadow: 0 0 40px rgba(139,26,26,0.2);
  }
  .play-btn svg {
    width: 28px; height: 28px; fill: var(--rouge-light);
    margin-left: 4px;
  }
  .play-label {
    font-family: 'Inter', sans-serif; font-weight: 200;
    font-size: 0.7rem; letter-spacing: 6px; text-transform: uppercase;
    color: var(--argent); opacity: 0.6;
  }
  .play-sub {
    font-family: 'Inter', sans-serif; font-weight: 200;
    font-size: 0.45rem; letter-spacing: 3px;
    color: var(--argent); opacity: 0.3; margin-top: 8px;
  }

  /* ─── Audio indicator ─── */
  .audio-indicator {
    position: absolute; bottom: 80px; right: 20px; z-index: 60;
    display: flex; align-items: center; gap: 6px;
    font-family: 'Inter', sans-serif; font-weight: 200;
    font-size: 0.35rem; letter-spacing: 2px; text-transform: uppercase;
    color: var(--argent); opacity: 0; transition: opacity 1s ease;
    pointer-events: none;
  }
  .audio-indicator.visible { opacity: 0.2; }
  .audio-bar {
    width: 2px; height: 8px; background: var(--rouge-light);
    border-radius: 1px; opacity: 0.5;
    animation: audioPulse 0.8s ease-in-out infinite alternate;
  }
  .audio-bar:nth-child(2) { animation-delay: 0.15s; height: 12px; }
  .audio-bar:nth-child(3) { animation-delay: 0.3s; height: 6px; }
  .audio-bar:nth-child(4) { animation-delay: 0.45s; height: 14px; }
  @keyframes audioPulse {
    0%   { opacity: 0.2; transform: scaleY(0.6); }
    100% { opacity: 0.6; transform: scaleY(1); }
  }
  .audio-indicator.muted .audio-bar { animation: none; opacity: 0.08; transform: scaleY(0.5); }

  /* ─── YouTube embed hidden ─── */
  #youtube-player {
    position: absolute; width: 1px; height: 1px; opacity: 0.01;
    pointer-events: none; z-index: -1;
  }

  /* ─── Export button ─── */
  .export-btn {
    position: absolute; bottom: 80px; left: 50%; z-index: 70;
    transform: translateX(-50%);
    font-family: 'Inter', sans-serif; font-weight: 200;
    font-size: 0.45rem; letter-spacing: 3px; text-transform: uppercase;
    color: var(--argent); opacity: 0;
    transition: opacity 0.8s ease;
    background: none; border: none; cursor: pointer;
    padding: 8px 16px;
    pointer-events: none;
    text-decoration: underline;
    text-underline-offset: 4px;
    text-decoration-thickness: 0.5px;
  }
  .export-btn.visible { opacity: 0.2; pointer-events: auto; }
  .export-btn:hover { opacity: 0.4; }
  .export-btn.recording { opacity: 0.6; color: var(--rouge-light); animation: pulseText 0.6s ease-in-out infinite alternate; }
  .export-btn.done { opacity: 0.6; color: #4ade80; text-decoration: none; }
  @keyframes pulseText {
    0% { opacity: 0.4; }
    100% { opacity: 0.8; }
  }
</style>

<script>
// ════════════════════════════════════════════════════════════════
// VELVET ROUGE — Cinematic Teaser Engine v2
// 1080×1920 · 20s · 24fps · Fashion Film Quality
// ════════════════════════════════════════════════════════════════

const canvas = document.getElementById('scene-canvas');
const fxCanvas = document.getElementById('fx-canvas');
const ctx = canvas.getContext('2d');
const fxCtx = fxCanvas.getContext('2d');

let W, H;
function resize() {
  const rect = canvas.parentElement.getBoundingClientRect();
  W = canvas.width = fxCanvas.width = rect.width;
  H = canvas.height = fxCanvas.height = rect.height;
}
resize();
window.addEventListener('resize', resize);

// ─── Timeline ───
const DURATION = 20;
const FPS = 24;
let startTime = null;
let loopCount = 0;
let audioStarted = false;
let isPlaying = false;

// ─── YouTube Audio Integration ───
const YT_VIDEO_ID = 'Ctv_rdjOFuQ';
let ytPlayer = null;
let ytReady = false;
let ytLoading = false;
let pendingPlay = false;

// Load YouTube IFrame API
function loadYouTubeAPI() {
  if (window.YT && window.YT.Player) { onYouTubeReady(); return; }
  if (ytLoading) return;
  ytLoading = true;
  const tag = document.createElement('script');
  tag.src = 'https://www.youtube.com/iframe_api';
  tag.async = true;
  const first = document.getElementsByTagName('script')[0];
  first.parentNode.insertBefore(tag, first);
}

window.onYouTubeIframeAPIReady = function() {
  onYouTubeReady();
};

function onYouTubeReady() {
  ytPlayer = new YT.Player('youtube-player', {
    videoId: YT_VIDEO_ID,
    width: 1, height: 1,
    playerVars: {
      autoplay: 0,
      controls: 0,
      playsinline: 1,
      rel: 0,
      showinfo: 0,
      modestbranding: 1,
      iv_load_policy: 3,
      fs: 0,
      disablekb: 1,
      enablejsapi: 1,
      origin: window.location.origin
    },
    events: {
      onReady: function() { ytReady = true; },
      onStateChange: function(e) {
        if (e.data === YT.PlayerState.ENDED && isPlaying) {
          // When track ends, seek to beginning for next loop
          if (ytPlayer && ytPlayer.seekTo) {
            ytPlayer.seekTo(0);
            ytPlayer.playVideo();
          }
        }
      },
      onError: function() { /* silently fail */ }
    }
  });
}

// ─── Audio Control ───
function startAudio() {
  if (!ytReady || !ytPlayer || !ytPlayer.playVideo) {
    pendingPlay = true;
    return;
  }
  try {
    ytPlayer.seekTo(0);
    ytPlayer.playVideo();
    audioStarted = true;
    isPlaying = true;
    document.getElementById('audioIndicator').classList.add('visible');
    document.getElementById('audioIndicator').classList.remove('muted');
  } catch(e) { /* fail silently */ }
}

function stopAudio() {
  if (ytPlayer && ytPlayer.pauseVideo) {
    try { ytPlayer.pauseVideo(); } catch(e) {}
  }
  isPlaying = false;
}

function fadeAudioOut(duration) {
  if (!ytPlayer) return;
  // YouTube API doesn't support volume fade directly
  // We use setVolume with a timer
  let vol = 100;
  const steps = 10;
  const stepTime = duration / steps;
  const interval = setInterval(() => {
    vol -= 100 / steps;
    if (vol <= 0) {
      vol = 0;
      clearInterval(interval);
      try { ytPlayer.pauseVideo(); } catch(e) {}
      isPlaying = false;
    }
    try { ytPlayer.setVolume(Math.max(0, vol)); } catch(e) {}
  }, stepTime * 1000);
}

function resetAudioForLoop() {
  if (ytPlayer && ytPlayer.seekTo) {
    try {
      ytPlayer.setVolume(100);
      ytPlayer.seekTo(0);
      ytPlayer.playVideo();
      isPlaying = true;
    } catch(e) {}
  }
}

// ─── Play Button ───
const playOverlay = document.getElementById('playOverlay');
const playBtn = document.getElementById('playBtn');

function handlePlay() {
  playOverlay.classList.add('hidden');
  // Start canvas with a fresh timestamp
  startTime = null;
  // Start audio
  if (ytReady) {
    startAudio();
  } else {
    loadYouTubeAPI();
    pendingPlay = true;
  }
  // Start render loop if not running
  if (!renderLoopActive) {
    renderLoopActive = true;
    requestAnimationFrame(render);
  }
  // Show export button
  showExportBtn();
}

playOverlay.addEventListener('click', handlePlay);
playBtn.addEventListener('click', function(e) { e.stopPropagation(); handlePlay(); });

// Also allow spacebar to start
document.addEventListener('keydown', function(e) {
  if (e.key === ' ' || e.key === 'Enter') {
    if (!playOverlay.classList.contains('hidden')) {
      e.preventDefault();
      handlePlay();
    }
  }
});

// ─── Scene definitions ───
const SCENES = {
  velvet:    { start: 0,   end: 4   },
  cdmx:      { start: 4,   end: 8   },
  tokyo:     { start: 8,   end: 12  },
  guangzhou: { start: 12,  end: 16  },
  montage:   { start: 16,  end: 18  },
  reveal:    { start: 18,  end: 20  }
};

function getScene(t) {
  if (t < 4)   return 'velvet';
  if (t < 8)   return 'cdmx';
  if (t < 12)  return 'tokyo';
  if (t < 16)  return 'guangzhou';
  if (t < 18)  return 'montage';
  return 'reveal';
}

function sceneProgress(t, key) {
  const s = SCENES[key];
  return Math.min(1, Math.max(0, (t - s.start) / (s.end - s.start)));
}

// ─── Utilities ───
function lerp(a, b, t) { return a + (b - a) * t; }
function clamp(v, mn, mx) { return Math.max(mn, Math.min(mx, v)); }
function easeOutCubic(t) { return 1 - Math.pow(1 - t, 3); }
function easeInCubic(t) { return t * t * t; }
function easeInOutQuad(t) { return t < 0.5 ? 2*t*t : -1 + (4 - 2*t)*t; }
function smoothstep(t) { return t * t * (3 - 2*t); }
function rand(min, max) { return min + Math.random() * (max - min); }
function randInt(min, max) { return Math.floor(rand(min, max + 1)); }

const ROUGE = { r: 139, g: 26, b: 26 };
const ROUGE_LIGHT = { r: 196, g: 32, b: 32 };
const ARGENT = { r: 192, g: 192, b: 192 };
const NOIR = { r: 5, g: 5, b: 5 };
const SKIN = { r: 220, g: 180, b: 160 };

function rgba(c, a) { return `rgba(${c.r},${c.g},${c.b},${a})`; }

function lerpColor(c1, c2, t) {
  return {
    r: Math.round(c1.r + (c2.r - c1.r) * t),
    g: Math.round(c1.g + (c2.g - c1.g) * t),
    b: Math.round(c1.b + (c2.b - c1.b) * t)
  };
}

// ─── Seeded pseudo-random for coherent noise ───
class SimplexNoise {
  constructor(seed = 42) {
    this.seed = seed;
    this.perm = new Uint8Array(512);
    const p = new Uint8Array(256);
    for (let i = 0; i < 256; i++) p[i] = i;
    // Fisher-Yates
    let s = seed;
    for (let i = 255; i > 0; i--) {
      s = (s * 16807 + 0) % 2147483647;
      const j = s % (i + 1);
      [p[i], p[j]] = [p[j], p[i]];
    }
    for (let i = 0; i < 512; i++) this.perm[i] = p[i & 255];
  }

  noise2D(x, y) {
    const X = Math.floor(x) & 255;
    const Y = Math.floor(y) & 255;
    const xf = x - Math.floor(x);
    const yf = y - Math.floor(y);
    const u = xf * xf * (3 - 2 * xf);
    const v = yf * yf * (3 - 2 * yf);
    const aa = this.perm[this.perm[X] + Y];
    const ab = this.perm[this.perm[X] + Y + 1];
    const ba = this.perm[this.perm[X + 1] + Y];
    const bb = this.perm[this.perm[X + 1] + Y + 1];
    const x1 = lerp(this.grad(aa, xf, yf), this.grad(ba, xf - 1, yf), u);
    const x2 = lerp(this.grad(ab, xf, yf - 1), this.grad(bb, xf - 1, yf - 1), u);
    return lerp(x1, x2, v);
  }

  grad(hash, x, y) {
    const h = hash & 3;
    const u = h < 2 ? x : y;
    const v = h < 2 ? y : x;
    return ((h & 1) === 0 ? u : -u) + ((h & 2) === 0 ? v : -v);
  }

  fbm(x, y, octaves = 3) {
    let value = 0, amplitude = 1, frequency = 1, maxVal = 0;
    for (let i = 0; i < octaves; i++) {
      value += amplitude * this.noise2D(x * frequency, y * frequency);
      maxVal += amplitude;
      amplitude *= 0.5;
      frequency *= 2;
    }
    return value / maxVal;
  }
}

const noise = new SimplexNoise(137);

// ════════════════════════════════════════════════════════════════
// SCENE 1: 0-4s — VELVET TEXTURE
// ════════════════════════════════════════════════════════════════
let velvetPhase = 0;

function renderVelvet(ctx, t, dt) {
  const w = W, h = H;
  const p = sceneProgress(t, 'velvet');
  const time = t * 0.5;

  // Deep noir background
  ctx.fillStyle = '#050505';
  ctx.fillRect(0, 0, w, h);

  // Velvet fabric — procedural noise-based folds
  const scale = 0.004;
  for (let y = 0; y < h; y += 2) {
    for (let x = 0; x < w; x += 4) {
      const nx = x * scale;
      const ny = y * scale;
      const n = noise.fbm(nx + time * 0.05, ny + time * 0.03, 3);
      const n2 = noise.fbm(nx * 2.5 + time * 0.08, ny * 2.5 - time * 0.04, 2);

      // Fold intensity
      const fold = (n + 1) * 0.5;
      const micro = (n2 + 1) * 0.5;

      // Velvet color: deep red with fold-driven variation
      const redBase = ROUGE.r * (0.12 + fold * 0.6);
      const greenBase = ROUGE.g * (0.05 + fold * 0.3);
      const blueBase = ROUGE.b * (0.03 + fold * 0.2);

      // Micro-texture for fabric softness
      const microShade = (micro - 0.5) * 15;

      const r = clamp(redBase + microShade, 0, 255);
      const g = clamp(greenBase + microShade * 0.3, 0, 255);
      const b = clamp(blueBase + microShade * 0.2, 0, 255);

      // Light source from top-center
      const distFromCenter = Math.abs(x / w - 0.5) * 2;
      const lightFalloff = 1 - distFromCenter * 0.3;
      const alpha = (0.08 + fold * 0.3) * lightFalloff;

      ctx.fillStyle = `rgba(${r},${g},${b},${alpha})`;
      ctx.fillRect(x, y, 4, 2);
    }
  }

  // Central glow — warm pull
  const glowPhase = 0.5 + Math.sin(time * 2 * Math.PI) * 0.15;
  const glow1 = ctx.createRadialGradient(w*0.5, h*0.42, 0, w*0.5, h*0.42, w*0.45);
  glow1.addColorStop(0, `rgba(139,26,26,${0.04 + glowPhase * 0.025})`);
  glow1.addColorStop(0.6, `rgba(139,26,26,${0.01})`);
  glow1.addColorStop(1, 'rgba(0,0,0,0)');
  ctx.fillStyle = glow1;
  ctx.fillRect(0, 0, w, h);

  // Subtle red light leak from bottom
  const glow2 = ctx.createRadialGradient(w*0.45, h*1.1, 0, w*0.45, h, w*0.5);
  glow2.addColorStop(0, `rgba(196,32,32,${0.02})`);
  glow2.addColorStop(1, 'rgba(0,0,0,0)');
  ctx.fillStyle = glow2;
  ctx.fillRect(0, 0, w, h);

  // Champagne glass macro close-up (flute outline, bottom-right, shallow DOF)
  if (p > 0.3) {
    const cx = w * 0.72;
    const cy = h * 0.7;
    const cs = 0.12;
    const glassAlpha = (p - 0.3) / 0.7 * 0.3;

    // Glass stem
    ctx.strokeStyle = `rgba(220,220,210,${glassAlpha * 0.4})`;
    ctx.lineWidth = 0.8;
    ctx.beginPath();
    ctx.moveTo(cx, cy);
    ctx.lineTo(cx - 3 * cs * w * 0.01, cy + 16 * cs * w * 0.01);
    ctx.stroke();

    // Glass bowl
    ctx.strokeStyle = `rgba(220,220,210,${glassAlpha * 0.3})`;
    ctx.beginPath();
    ctx.ellipse(cx, cy - 6 * cs * w * 0.01, 4 * cs * w * 0.01, 6 * cs * w * 0.01, 0, 0, Math.PI * 2);
    ctx.stroke();

    // Champagne bubble
    for (let i = 0; i < 3; i++) {
      const bx = cx + Math.sin(i * 73.1 + time * 2) * 2;
      const by = cy - 6 * cs * w * 0.01 - i * 3;
      const bsize = 0.8 + Math.sin(i * 43.7 + time * 3) * 0.3;
      ctx.fillStyle = `rgba(255,240,220,${glassAlpha * 0.15})`;
      ctx.beginPath();
      ctx.arc(bx, by, bsize, 0, Math.PI * 2);
      ctx.fill();
    }
  }

  // Deep bass pulse at t=1.5s
  if (t > 1.2 && t < 1.9) {
    const flash = Math.sin((t - 1.2) / 0.7 * Math.PI);
    ctx.fillStyle = `rgba(196,32,32,${flash * 0.035})`;
    ctx.fillRect(0, 0, w, h);
  }

  // Small red flash at t=3.2s
  if (t > 3.0 && t < 3.6) {
    const flash = Math.sin((t - 3.0) / 0.6 * Math.PI);
    ctx.fillStyle = `rgba(196,32,32,${flash * 0.025})`;
    ctx.fillRect(0, 0, w, h);
  }
}

// ════════════════════════════════════════════════════════════════
// SCENE 2: 4-8s — MEXICO CITY
// ════════════════════════════════════════════════════════════════

function renderCDMX(ctx, t, dt) {
  const w = W, h = H;
  const p = sceneProgress(t, 'cdmx');
  const time = t * 0.7;

  // Deep night sky — more contrast
  const skyGrad = ctx.createLinearGradient(0, 0, 0, h*0.5);
  skyGrad.addColorStop(0, '#0a0a1a');
  skyGrad.addColorStop(0.5, '#120e12');
  skyGrad.addColorStop(1, '#1a0e0a');
  ctx.fillStyle = skyGrad;
  ctx.fillRect(0, 0, w, h);

  // City skyline — Reforma buildings (much more visible)
  ctx.fillStyle = '#151518';
  const bldgs = [
    { x: w*0.02,  w: w*0.06, h: h*0.18 },
    { x: w*0.10,  w: w*0.05, h: h*0.32 },
    { x: w*0.20,  w: w*0.08, h: h*0.20 },
    { x: w*0.32,  w: w*0.06, h: h*0.38 },
    { x: w*0.42,  w: w*0.12, h: h*0.26 },
    { x: w*0.58,  w: w*0.07, h: h*0.35 },
    { x: w*0.68,  w: w*0.05, h: h*0.22 },
    { x: w*0.76,  w: w*0.09, h: h*0.30 },
    { x: w*0.88,  w: w*0.06, h: h*0.18 },
    { x: w*0.95,  w: w*0.05, h: h*0.28 }
  ];
  // Draw buildings as solid silhouettes first
  bldgs.forEach(b => {
    const by = h - b.h - h*0.20;
    ctx.fillRect(b.x, by, b.w, b.h);
    // Windows — bright and visible
    for (let wy = by + 6; wy < by + b.h - 6; wy += 8) {
      for (let wx = b.x + 3; wx < b.x + b.w - 3; wx += 7) {
        if (Math.random() > 0.35) {
          const bright = 0.15 + Math.random() * 0.5 + Math.sin(time + wx * 0.1) * 0.1;
          ctx.fillStyle = `rgba(255,220,180,${bright})`;
          ctx.fillRect(wx, wy, 3, 4);
        }
      }
    }
  });

  // Ángel de la Independencia silhouette (center landmark)
  const angelX = w * 0.5;
  const angelY = h - h*0.58;
  ctx.fillStyle = '#1a1a20';
  // Column
  ctx.fillRect(angelX - 3, angelY, 6, h*0.38);
  // Base
  ctx.fillRect(angelX - 12, angelY + h*0.35, 24, 8);
  // Winged victory statue top
  ctx.beginPath();
  ctx.arc(angelX, angelY - 8, 8, 0, Math.PI * 2);
  ctx.fill();
  // Wings
  ctx.fillRect(angelX - 14, angelY - 14, 28, 4);
  ctx.fillRect(angelX - 10, angelY - 18, 20, 3);

  // Warm golden glow from city
  const warmGlow = ctx.createRadialGradient(w*0.5, h*0.5, 0, w*0.5, h*0.4, w*0.5);
  warmGlow.addColorStop(0, `rgba(255,200,150,${0.04})`);
  warmGlow.addColorStop(0.5, `rgba(255,180,120,${0.015})`);
  warmGlow.addColorStop(1, 'rgba(0,0,0,0)');
  ctx.fillStyle = warmGlow;
  ctx.fillRect(0, 0, w, h);

  // RED ambiance — subtle
  const redGlow = ctx.createRadialGradient(w*0.2, h*0.15, 0, w*0.2, h*0.15, w*0.3);
  redGlow.addColorStop(0, `rgba(196,32,32,${0.02})`);
  redGlow.addColorStop(1, 'rgba(0,0,0,0)');
  ctx.fillStyle = redGlow;
  ctx.fillRect(0, 0, w, h);

  // Luxury rooftop terrace (lower third) — much more visible
  ctx.strokeStyle = `rgba(80,80,85,${0.5})`;
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(0, h*0.72);
  ctx.lineTo(w, h*0.72);
  ctx.stroke();

  // Floor of terrace
  const floorGrad = ctx.createLinearGradient(0, h*0.72, 0, h);
  floorGrad.addColorStop(0, 'rgba(25,20,18,0.95)');
  floorGrad.addColorStop(0.5, 'rgba(15,10,10,1)');
  floorGrad.addColorStop(1, 'rgba(8,5,5,1)');
  ctx.fillStyle = floorGrad;
  ctx.fillRect(0, h*0.72, w, h*0.28);

  // PEOPLE ARRIVING — much more visible
  // Group 1: Two people in conversation (center-left)
  const group1X = w * 0.28;
  const group1Y = h * 0.68;

  // Person A (black blazer)
  ctx.fillStyle = 'rgba(15,15,15,0.85)';
  ctx.fillRect(group1X - 8, group1Y - 40, 18, 40);
  ctx.beginPath();
  ctx.arc(group1X + 1, group1Y - 46, 8, 0, Math.PI * 2);
  ctx.fill();
  // Face warm tone
  ctx.fillStyle = `rgba(220,180,160,${0.08})`;
  ctx.beginPath();
  ctx.arc(group1X + 1, group1Y - 46, 5, 0, Math.PI * 2);
  ctx.fill();

  // Person B (facing A, long coat)
  const g1bX = group1X + 26 + Math.sin(time * 0.3) * 2;
  ctx.fillStyle = 'rgba(12,12,15,0.85)';
  ctx.fillRect(g1bX - 7, group1Y - 38, 16, 38);
  ctx.beginPath();
  ctx.arc(g1bX + 1, group1Y - 44, 7.5, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = `rgba(220,180,160,${0.06})`;
  ctx.beginPath();
  ctx.arc(g1bX + 1, group1Y - 44, 5, 0, Math.PI * 2);
  ctx.fill();

  // Red rim light on shoulders
  ctx.fillStyle = `rgba(196,32,32,${0.06})`;
  ctx.fillRect(group1X + 6, group1Y - 38, 4, 6);
  ctx.fillRect(g1bX - 2, group1Y - 35, 4, 6);

  // Group 2: Three people near railing (center-right)
  const group2X = w * 0.62;
  const group2Y = h * 0.67;

  // Person C (leaning on railing, looking out)
  ctx.fillStyle = 'rgba(15,15,18,0.85)';
  ctx.fillRect(group2X - 8, group2Y - 38, 16, 38);
  ctx.beginPath();
  ctx.arc(group2X, group2Y - 44, 8, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = `rgba(220,180,160,${0.07})`;
  ctx.beginPath();
  ctx.arc(group2X, group2Y - 44, 5, 0, Math.PI * 2);
  ctx.fill();

  // Leather jacket
  ctx.fillStyle = 'rgba(20,15,15,0.6)';
  ctx.fillRect(group2X - 10, group2Y - 30, 5, 20);

  // Person D (facing C)
  const g2bX = group2X + 20;
  ctx.fillStyle = 'rgba(12,12,15,0.8)';
  ctx.fillRect(g2bX - 6, group2Y - 35, 14, 35);
  ctx.beginPath();
  ctx.arc(g2bX, group2Y - 41, 7, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = `rgba(220,180,160,${0.06})`;
  ctx.beginPath();
  ctx.arc(g2bX, group2Y - 41, 4.5, 0, Math.PI * 2);
  ctx.fill();

  // Person E (behind, slightly shorter)
  const g2cX = group2X + 36;
  ctx.fillStyle = 'rgba(18,15,18,0.6)';
  ctx.fillRect(g2cX - 5, group2Y - 30, 12, 30);
  ctx.beginPath();
  ctx.arc(g2cX, group2Y - 36, 6, 0, Math.PI * 2);
  ctx.fill();

  // City name overlay
  ctx.font = `${Math.round(w * 0.018)}px "Inter", sans-serif`;
  ctx.fillStyle = `rgba(192,192,192,${0.08 + Math.sin(time) * 0.03})`;
  ctx.textAlign = 'right';
  ctx.textBaseline = 'top';
  ctx.fillText('CIUDAD DE MEXICO', w - 20, h * 0.12);
  ctx.textAlign = 'left';
  ctx.fillStyle = `rgba(196,32,32,${0.04})`;
  ctx.font = `${Math.round(w * 0.008)}px "Inter", sans-serif`;
  ctx.fillText('4s — 8s', 20, h * 0.95);
}

// ════════════════════════════════════════════════════════════════
// SCENE 3: 8-12s — TOKYO
// ════════════════════════════════════════════════════════════════

function renderTokyo(ctx, t, dt) {
  const w = W, h = H;
  const p = sceneProgress(t, 'tokyo');
  const time = t * 0.8;

  // Dark background with slight red cast
  ctx.fillStyle = '#0a0508';
  ctx.fillRect(0, 0, w, h);

  // Shibuya skyline silhouettes
  ctx.fillStyle = '#121015';
  for (let i = 0; i < 18; i++) {
    const bx = i * w * 0.058;
    const bw = w * 0.03 + Math.sin(i * 43.7) * w * 0.015;
    const bh = h * (0.12 + Math.sin(i * 73.1) * 0.08 + 0.08);
    ctx.fillRect(bx, h - bh - h*0.15, bw, bh);
    // Windows
    for (let wy = h - bh - h*0.15 + 4; wy < h - h*0.15 - 4; wy += 7) {
      for (let wx = bx + 2; wx < bx + bw - 2; wx += 5) {
        if (Math.random() > 0.4) {
          ctx.fillStyle = `rgba(255,240,200,${0.08 + Math.random() * 0.3})`;
          ctx.fillRect(wx, wy, 2, 3);
        }
      }
    }
  }

  // Tokyo Tower silhouette (right side)
  const ttX = w * 0.82;
  const ttBase = h - h*0.35;
  const ttH = h * 0.35;
  ctx.fillStyle = '#1a1518';
  // Main tower body (tapered)
  ctx.beginPath();
  ctx.moveTo(ttX - 6, ttBase);
  ctx.lineTo(ttX - 3, ttBase - ttH + 20);
  ctx.lineTo(ttX + 3, ttBase - ttH + 20);
  ctx.lineTo(ttX + 6, ttBase);
  ctx.fill();
  // Top antenna
  ctx.fillRect(ttX - 1, ttBase - ttH, 2, 20);
  // Tower observation deck
  ctx.fillRect(ttX - 8, ttBase - ttH + 15, 16, 3);
  // Red tower lights
  ctx.fillStyle = `rgba(196,32,32,${0.15 + Math.sin(time * 2) * 0.05})`;
  ctx.fillRect(ttX - 4, ttBase - ttH + 10, 8, 2);
  ctx.fillRect(ttX - 2, ttBase - ttH + 5, 4, 2);

  // VERTICAL NEON — Shibuya-style (much brighter)
  const neons = [
    { x: w*0.06, bw: 6 },
    { x: w*0.13, bw: 4 },
    { x: w*0.22, bw: 8 },
    { x: w*0.30, bw: 5 },
    { x: w*0.40, bw: 7 },
    { x: w*0.50, bw: 4 },
    { x: w*0.58, bw: 9 },
    { x: w*0.68, bw: 5 },
    { x: w*0.76, bw: 6 },
    { x: w*0.88, bw: 4 }
  ];

  neons.forEach((n, i) => {
    const flicker = Math.random() > 0.05 ? 1 : 0.15;
    const pulse = 0.4 + Math.sin(time * 1.5 + i * 2.3) * 0.3;
    const alpha = (0.04 + pulse * 0.06) * flicker;

    // Direct neon light
    ctx.fillStyle = `rgba(196,32,32,${alpha * 2})`;
    ctx.fillRect(n.x, 0, n.bw, h);

    // Neon glow spread
    const glow = ctx.createRadialGradient(n.x + n.bw/2, h*0.5, 0, n.x + n.bw/2, h*0.5, w*0.08);
    glow.addColorStop(0, `rgba(196,32,32,${alpha})`);
    glow.addColorStop(0.5, `rgba(139,26,26,${alpha * 0.3})`);
    glow.addColorStop(1, 'rgba(196,32,32,0)');
    ctx.fillStyle = glow;
    ctx.fillRect(n.x - w*0.08, 0, w*0.16 + n.bw, h);

    // Horizontal neon signs
    if (i % 3 === 0) {
      const sy = h * 0.15 + Math.sin(i * 53.7) * h * 0.05;
      ctx.fillStyle = `rgba(196,32,32,${alpha * 0.8})`;
      ctx.fillRect(n.x - 4, sy, n.bw + 8, 3);
      ctx.fillRect(n.x - 4, sy + 8, n.bw + 8, 3);
    }
  });

  // RED AMBIENT FOG
  const ambFog = ctx.createRadialGradient(w*0.35, h*0.5, 0, w*0.35, h*0.5, w*0.7);
  ambFog.addColorStop(0, `rgba(139,26,26,${0.06})`);
  ambFog.addColorStop(0.5, `rgba(80,15,15,${0.03})`);
  ambFog.addColorStop(1, 'rgba(0,0,0,0)');
  ctx.fillStyle = ambFog;
  ctx.fillRect(0, 0, w, h);

  // Smoke haze particles
  for (let i = 0; i < 20; i++) {
    const sx = (Math.sin(i * 73.7 + time * 0.05 + i) * 0.5 + 0.5) * w;
    const sy = (Math.cos(i * 43.1 + time * 0.03 + i * 0.5) * 0.5 + 0.5) * h * 0.5 + h * 0.2;
    const ss = 10 + Math.sin(i * 53.3 + time * 0.1) * 5;
    const sa = 0.02 + Math.sin(i * 29.7 + time * 0.05) * 0.01;
    ctx.fillStyle = `rgba(200,100,80,${sa})`;
    ctx.beginPath();
    ctx.arc(sx, sy, ss, 0, Math.PI * 2);
    ctx.fill();
  }

  // PRIVATE CONVERSATIONS — groups much more visible
  // Group 1: Two people in deep conversation (center)
  const g1x = w * 0.38;
  const g1y = h * 0.55;

  // Person F (leaning in, talking)
  ctx.fillStyle = 'rgba(10,10,12,0.85)';
  ctx.fillRect(g1x - 9, g1y - 42, 18, 42);
  ctx.beginPath();
  ctx.arc(g1x - 2, g1y - 48, 8, 0, Math.PI * 2);
  ctx.fill();
  // Red neon rim light (right side)
  ctx.fillStyle = `rgba(196,32,32,${0.08})`;
  ctx.fillRect(g1x + 4, g1y - 42, 4, 42);
  // Face highlight
  ctx.fillStyle = `rgba(220,180,160,${0.06})`;
  ctx.beginPath();
  ctx.arc(g1x - 3, g1y - 48, 5.5, 0, Math.PI * 2);
  ctx.fill();

  // Person G (listening, facing F)
  const g1bX = g1x + 32;
  ctx.fillStyle = 'rgba(10,10,12,0.85)';
  ctx.fillRect(g1bX - 8, g1y - 38, 16, 38);
  ctx.beginPath();
  ctx.arc(g1bX + 1, g1y - 44, 7.5, 0, Math.PI * 2);
  ctx.fill();
  // Left rim light
  ctx.fillStyle = `rgba(196,32,32,${0.06})`;
  ctx.fillRect(g1bX - 3, g1y - 38, 3, 38);
  ctx.fillStyle = `rgba(220,180,160,${0.05})`;
  ctx.beginPath();
  ctx.arc(g1bX, g1y - 44, 5, 0, Math.PI * 2);
  ctx.fill();

  // Group 2: Three people near window/glass (right)
  const g2x = w * 0.72;
  const g2y = h * 0.58;

  // Person H
  ctx.fillStyle = 'rgba(12,12,15,0.8)';
  ctx.fillRect(g2x - 7, g2y - 36, 14, 36);
  ctx.beginPath();
  ctx.arc(g2x, g2y - 42, 7, 0, Math.PI * 2);
  ctx.fill();

  // Person I
  const g2bX = g2x + 18;
  ctx.fillStyle = 'rgba(12,12,15,0.75)';
  ctx.fillRect(g2bX - 6, g2y - 34, 12, 34);
  ctx.beginPath();
  ctx.arc(g2bX, g2y - 40, 6.5, 0, Math.PI * 2);
  ctx.fill();

  // Person J (behind)
  const g2cX = g2x - 20;
  ctx.fillStyle = 'rgba(15,12,15,0.5)';
  ctx.fillRect(g2cX - 5, g2y - 30, 12, 30);
  ctx.beginPath();
  ctx.arc(g2cX, g2y - 36, 6, 0, Math.PI * 2);
  ctx.fill();

  // Elevator doors opening (left)
  const doorX = w * 0.04;
  const doorY = h * 0.60;
  const doorW = w * 0.08;
  const doorH = h * 0.30;
  const doorOpen = easeOutCubic(Math.min(1, (t - 8.5) / 2));

  // Door frame
  ctx.strokeStyle = `rgba(100,100,105,${0.4})`;
  ctx.lineWidth = 2;
  ctx.strokeRect(doorX, doorY, doorW, doorH);

  // Door opening gap
  const gap = doorW * 0.45 * doorOpen;
  ctx.fillStyle = 'rgba(25,25,28,0.5)';
  ctx.fillRect(doorX, doorY, doorW/2 - gap/2, doorH);
  ctx.fillRect(doorX + doorW/2 + gap/2, doorY, doorW/2 - gap/2, doorH);
  // Interior light
  const intLight = ctx.createRadialGradient(doorX + doorW/2, doorY + doorH/2, 0, doorX + doorW/2, doorY + doorH/2, doorW);
  intLight.addColorStop(0, `rgba(255,220,200,${doorOpen * 0.08})`);
  intLight.addColorStop(1, 'rgba(0,0,0,0)');
  ctx.fillStyle = intLight;
  ctx.fillRect(doorX, doorY, doorW, doorH);

  // Silhouette emerging from elevator
  if (doorOpen > 0.4) {
    const emergeP = (doorOpen - 0.4) / 0.6;
    const eX = doorX + doorW/2;
    const eY = doorY + doorH - 12 * emergeP;
    ctx.fillStyle = `rgba(10,10,12,${0.4 * emergeP})`;
    ctx.fillRect(eX - 6, eY - 32, 12, 32);
    ctx.beginPath();
    ctx.arc(eX, eY - 38, 7, 0, Math.PI * 2);
    ctx.fill();
  }

  // City name
  ctx.font = `${Math.round(w * 0.018)}px "Inter", sans-serif`;
  ctx.fillStyle = `rgba(192,192,192,${0.08 + Math.sin(time * 0.7) * 0.03})`;
  ctx.textAlign = 'right';
  ctx.textBaseline = 'top';
  ctx.fillText('TOKYO', w - 20, h * 0.12);
}

// ════════════════════════════════════════════════════════════════
// SCENE 4: 12-16s — GUANGZHOU
// ════════════════════════════════════════════════════════════════

function renderGuangzhou(ctx, t, dt) {
  const w = W, h = H;
  const p = sceneProgress(t, 'guangzhou');
  const time = t * 0.6;

  // Deep night with blue-black sky
  ctx.fillStyle = '#08081a';
  ctx.fillRect(0, 0, w, h);

  // City skyline — modern glass towers (much more visible)
  const skyline = [
    { x: w*0.02, w: w*0.04, h: h*0.20 },
    { x: w*0.07, w: w*0.035, h: h*0.34 },
    { x: w*0.13, w: w*0.05, h: h*0.18 },
    { x: w*0.20, w: w*0.04, h: h*0.38 },
    { x: w*0.26, w: w*0.05, h: h*0.24 },
    { x: w*0.34, w: w*0.035, h: h*0.36 },
    { x: w*0.40, w: w*0.05, h: h*0.26 }
  ];

  skyline.forEach(b => {
    const by = h - b.h - h*0.15;
    ctx.fillStyle = '#12121e';
    ctx.fillRect(b.x, by, b.w, b.h);

    // Glass reflections on buildings
    for (let g = 0; g < 6; g++) {
      const gx = b.x + 2 + Math.random() * (b.w - 4);
      const gy = by + 5 + Math.random() * (b.h - 10);
      const gw = 2 + Math.random() * 5;
      const gh = 4 + Math.random() * 8;
      const ga = 0.04 + Math.random() * 0.06;
      ctx.fillStyle = `rgba(180,200,220,${ga})`;
      ctx.fillRect(gx, gy, gw, gh);
    }
  });

  // CANTON TOWER — the iconic supertall (much brighter)
  const towerX = w * 0.65;
  const towerH = h * 0.52;
  const towerY = h * 0.12;

  // Tower body with twist structure
  for (let i = 0; i < 90; i++) {
    const ty = towerY + (i / 90) * towerH;
    const twist = Math.sin(i * 0.22 + time * 0.08) * 0.35;
    const tw = 3 + twist * 2.5;
    const pulse = 0.5 + Math.sin(time + i * 0.12) * 0.3;
    const alpha = 0.04 + (1 - Math.abs(i/90 - 0.5) * 2) * 0.06;

    // Red tower light
    ctx.fillStyle = `rgba(196,32,32,${alpha * (0.5 + pulse * 0.5)})`;
    ctx.fillRect(towerX - tw, ty, tw * 2, 2);

    // Silver edge highlight
    ctx.fillStyle = `rgba(200,210,220,${alpha * 0.2})`;
    ctx.fillRect(towerX + tw - 0.5, ty, 1, 2);
  }

  // Tower top glow
  const topGlow = ctx.createRadialGradient(towerX, towerY, 0, towerX, towerY, w*0.10);
  topGlow.addColorStop(0, `rgba(196,32,32,${0.08 + p * 0.04})`);
  topGlow.addColorStop(0.5, `rgba(139,26,26,${0.03})`);
  topGlow.addColorStop(1, 'rgba(0,0,0,0)');
  ctx.fillStyle = topGlow;
  ctx.fillRect(towerX - w*0.10, towerY - w*0.10, w*0.20, w*0.20);

  // Pearl River water (lower portion)
  const riverGrad = ctx.createLinearGradient(0, h*0.65, 0, h);
  riverGrad.addColorStop(0, 'rgba(8,8,18,0.9)');
  riverGrad.addColorStop(0.3, 'rgba(10,6,12,0.95)');
  riverGrad.addColorStop(1, 'rgba(5,3,8,1)');
  ctx.fillStyle = riverGrad;
  ctx.fillRect(0, h*0.65, w, h*0.35);

  // Water reflections of city and tower lights
  for (let i = 0; i < 50; i++) {
    const refX = (Math.sin(i * 83.7 + time * 0.06) * 0.5 + 0.5) * w;
    const refY = h*0.68 + Math.sin(i * 37.3 + time * 0.10) * h*0.08;
    const refL = 4 + Math.sin(i * 53.7) * 2;
    const refA = 0.02 + Math.sin(i * 29.3 + time * 0.15) * 0.015;
    // Red reflections from Canton Tower
    ctx.fillStyle = `rgba(196,32,32,${refA})`;
    ctx.fillRect(refX - refL/2, refY, refL, 1);
    // Silver reflections from other buildings
    ctx.fillStyle = `rgba(180,200,220,${refA * 0.3})`;
    ctx.fillRect(refX - refL/2 + 1, refY + 1, refL - 2, 0.5);
  }

  // LUXURY INTERIOR — glass-walled room with city view
  const interiorX = w * 0.03;
  const interiorY = h * 0.50;
  const interiorW = w * 0.38;
  const interiorH = h * 0.18;

  // Glass wall
  ctx.strokeStyle = `rgba(100,100,120,${0.25})`;
  ctx.lineWidth = 1.5;
  ctx.strokeRect(interiorX, interiorY, interiorW, interiorH);

  // Warm interior light
  const intGlow = ctx.createRadialGradient(interiorX + interiorW*0.5, interiorY + interiorH*0.5, 0, interiorX + interiorW*0.5, interiorY + interiorH*0.5, interiorW*0.8);
  intGlow.addColorStop(0, `rgba(255,220,200,${0.04})`);
  intGlow.addColorStop(0.5, `rgba(255,200,180,${0.015})`);
  intGlow.addColorStop(1, 'rgba(0,0,0,0)');
  ctx.fillStyle = intGlow;
  ctx.fillRect(interiorX, interiorY, interiorW, interiorH);

  // Silhouettes inside
  const siX = interiorX + interiorW * 0.3;
  const siY = interiorY + interiorH * 0.6;
  ctx.fillStyle = 'rgba(15,15,20,0.5)';
  ctx.fillRect(siX - 6, siY - 28, 12, 28);
  ctx.beginPath();
  ctx.arc(siX, siY - 33, 6, 0, Math.PI * 2);
  ctx.fill();

  const si2X = interiorX + interiorW * 0.65;
  ctx.fillStyle = 'rgba(15,15,20,0.45)';
  ctx.fillRect(si2X - 5, siY - 25, 10, 25);
  ctx.beginPath();
  ctx.arc(si2X, siY - 30, 5.5, 0, Math.PI * 2);
  ctx.fill();

  // Bass build-up pulses
  const buildUp = p * p;
  const beat = Math.floor(t / 0.469);
  const beatPhase = (t % 0.469) / 0.469;
  if (beatPhase < 0.05) {
    const flashAlpha = (1 - beatPhase/0.05) * 0.015 * (1 + buildUp * 3);
    ctx.fillStyle = `rgba(196,32,32,${flashAlpha})`;
    ctx.fillRect(0, 0, w, h);
  }

  // Red glow intensifying
  const endGlow = ctx.createRadialGradient(w*0.35, h*0.4, 0, w*0.35, h*0.4, w*0.5);
  endGlow.addColorStop(0, `rgba(139,26,26,${buildUp * 0.04})`);
  endGlow.addColorStop(0.6, `rgba(139,26,26,${buildUp * 0.015})`);
  endGlow.addColorStop(1, 'rgba(0,0,0,0)');
  ctx.fillStyle = endGlow;
  ctx.fillRect(0, 0, w, h);

  // City name
  ctx.font = `${Math.round(w * 0.018)}px "Inter", sans-serif`;
  ctx.fillStyle = `rgba(192,192,192,${0.08 + Math.sin(time * 0.5) * 0.03})`;
  ctx.textAlign = 'right';
  ctx.textBaseline = 'top';
  ctx.fillText('GUANGZHOU', w - 20, h * 0.12);
}

// ════════════════════════════════════════════════════════════════
// SCENE 5: 16-18s — RAPID MONTAGE
// ════════════════════════════════════════════════════════════════
// Fast cuts between all three cities

function renderMontage(ctx, t, dt) {
  const w = W, h = H;
  const p = sceneProgress(t, 'montage');
  const time = t;

  // Rapid cuts: ~6-8 frames per cut at 24fps = ~4 cuts per second
  // We'll cycle through scenes faster
  const cutDuration = 0.3; // seconds per cut
  const cutIndex = Math.floor((t - 16) / cutDuration);
  const cutPhase = ((t - 16) % cutDuration) / cutDuration;

  // Flash frame between cuts
  if (cutPhase < 0.04) {
    ctx.fillStyle = `rgba(255,255,255,${(1 - cutPhase/0.04) * 0.12})`;
    ctx.fillRect(0, 0, w, h);
    return;
  }

  switch (cutIndex % 9) {
    case 0: // CDMX — face close-up
      renderMontageFace(ctx, t);
      break;
    case 1: // Tokyo — neon texture
      renderMontageNeon(ctx, t);
      break;
    case 2: // Guangzhou — architecture detail
      renderMontageArch(ctx, t);
      break;
    case 3: // CDMX — glass detail
      renderMontageGlass(ctx, t);
      break;
    case 4: // Tokyo — fabric/texture
      renderMontageFabric(ctx, t);
      break;
    case 5: // Guangzhou — tower light
      renderMontageLight(ctx, t);
      break;
    case 6: // CDMX — hand detail
      renderMontageHand(ctx, t);
      break;
    case 7: // Tokyo — silhouette group
      renderMontageSilhouette(ctx, t);
      break;
    case 8: // All three — quick flash frames
      ctx.fillStyle = '#050505';
      ctx.fillRect(0, 0, w, h);
      // Split screen suggestion
      ctx.fillStyle = `rgba(196,32,32,${0.04})`;
      ctx.fillRect(0, h*0.33, w, 1);
      ctx.fillRect(0, h*0.66, w, 1);
      break;
  }

  // Energy overlay — pulsing noise
  const energy = 0.06 + Math.sin(time * 8) * 0.03;
  for (let i = 0; i < 40; i++) {
    const ex = Math.random() * w;
    const ey = Math.random() * h;
    ctx.fillStyle = `rgba(196,32,32,${Math.random() * energy})`;
    ctx.fillRect(ex, ey, 2, 1);
  }
}

function renderMontageFace(ctx, t) {
  const w = W, h = H;
  ctx.fillStyle = '#121018';
  ctx.fillRect(0, 0, w, h);

  // Close-up of face silhouette
  const cx = w * 0.4, cy = h * 0.45;
  ctx.fillStyle = 'rgba(15,15,18,0.7)';
  ctx.beginPath();
  ctx.arc(cx, cy, h*0.15, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillRect(cx - 12, cy, 24, h*0.18);
  // Red rim light on jawline
  ctx.strokeStyle = `rgba(196,32,32,${0.12})`;
  ctx.lineWidth = 3;
  ctx.beginPath();
  ctx.arc(cx + 5, cy, h*0.14, -0.3, 0.3);
  ctx.stroke();
  // Warm skin glow — much brighter
  const skinGlow = ctx.createRadialGradient(cx + 5, cy, 0, cx + 5, cy, h*0.12);
  skinGlow.addColorStop(0, `rgba(220,180,160,${0.04})`);
  skinGlow.addColorStop(1, 'rgba(0,0,0,0)');
  ctx.fillStyle = skinGlow;
  ctx.beginPath();
  ctx.arc(cx + 5, cy, h*0.12, 0, Math.PI * 2);
  ctx.fill();
}

function renderMontageNeon(ctx, t) {
  const w = W, h = H;
  ctx.fillStyle = '#0a0508';
  ctx.fillRect(0, 0, w, h);
  for (let i = 0; i < 6; i++) {
    const x = w * 0.1 + i * w * 0.16;
    const flicker = Math.random() > 0.05 ? 1 : 0.15;
    ctx.fillStyle = `rgba(196,32,32,${(0.08 + Math.random() * 0.1) * flicker})`;
    ctx.fillRect(x, 0, 4 + Math.random() * 2, h);
    const bloom = ctx.createRadialGradient(x, h*0.5, 0, x, h*0.5, w*0.06);
    bloom.addColorStop(0, `rgba(196,32,32,${0.04 * flicker})`);
    bloom.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.fillStyle = bloom;
    ctx.fillRect(x - w*0.06, 0, w*0.12, h);
  }
}

function renderMontageArch(ctx, t) {
  const w = W, h = H;
  ctx.fillStyle = '#0a0a18';
  ctx.fillRect(0, 0, w, h);
  for (let i = 0; i < 15; i++) {
    const y = i * h / 15;
    ctx.strokeStyle = `rgba(180,200,220,${0.03 + Math.random() * 0.04})`;
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.moveTo(0, y + Math.sin(i * 0.5) * 10);
    ctx.lineTo(w, y - 5 + Math.sin(i * 0.5 + 1) * 10);
    ctx.stroke();
  }
  ctx.fillStyle = `rgba(196,32,32,${0.04})`;
  ctx.fillRect(0, h*0.3, w, h*0.02);
  ctx.fillRect(0, h*0.65, w, h*0.015);
}

function renderMontageGlass(ctx, t) {
  const w = W, h = H;
  ctx.fillStyle = '#0e0a0e';
  ctx.fillRect(0, 0, w, h);
  const cx = w * 0.5, cy = h * 0.5;
  ctx.strokeStyle = `rgba(220,220,210,${0.15})`;
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.ellipse(cx, cy, 18, 35, 0, 0, Math.PI * 2);
  ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(cx, cy + 35);
  ctx.lineTo(cx, cy + 55);
  ctx.stroke();
  ctx.beginPath();
  ctx.ellipse(cx, cy + 55, 22, 5, 0, 0, Math.PI * 2);
  ctx.stroke();
  ctx.fillStyle = `rgba(255,200,150,${0.04})`;
  ctx.beginPath();
  ctx.ellipse(cx, cy + 8, 14, 20, 0, 0, Math.PI * 2);
  ctx.fill();
  for (let i = 0; i < 6; i++) {
    const bx = cx + Math.sin(i * 73.7) * 7;
    const by = cy + 18 - i * 6;
    ctx.fillStyle = `rgba(255,240,220,${0.06})`;
    ctx.beginPath();
    ctx.arc(bx, by, 1.5 + Math.random(), 0, Math.PI * 2);
    ctx.fill();
  }
}

function renderMontageFabric(ctx, t) {
  const w = W, h = H;
  ctx.fillStyle = '#080508';
  ctx.fillRect(0, 0, w, h);
  for (let y = 0; y < h; y += 2) {
    const n = noise.fbm(y * 0.01 + t * 0.1, 0, 2);
    const alpha = 0.03 + (n + 1) * 0.5 * 0.08;
    ctx.fillStyle = `rgba(139,26,26,${alpha})`;
    ctx.fillRect(0, y, w, 1);
  }
  ctx.fillStyle = `rgba(5,5,5,${0.5})`;
  ctx.fillRect(0, h*0.3, w, h*0.015);
  ctx.fillRect(0, h*0.7, w, h*0.012);
}

function renderMontageLight(ctx, t) {
  const w = W, h = H;
  ctx.fillStyle = '#080818';
  ctx.fillRect(0, 0, w, h);
  const lx = w * 0.5, ly = h * 0.4;
  const glow = ctx.createRadialGradient(lx, ly, 0, lx, ly, w*0.25);
  glow.addColorStop(0, `rgba(255,220,200,${0.06})`);
  glow.addColorStop(0.4, `rgba(255,180,120,${0.025})`);
  glow.addColorStop(0.7, `rgba(196,32,32,${0.01})`);
  glow.addColorStop(1, 'rgba(0,0,0,0)');
  ctx.fillStyle = glow;
  ctx.fillRect(0, 0, w, h);
  for (let i = 0; i < 5; i++) {
    ctx.strokeStyle = `rgba(196,32,32,${0.025})`;
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(lx - w*0.15, ly - h*0.1 + i * 12);
    ctx.lineTo(lx + w*0.15, ly + h*0.1 + i * 12);
    ctx.stroke();
  }
}

function renderMontageHand(ctx, t) {
  const w = W, h = H;
  ctx.fillStyle = '#0e0a0e';
  ctx.fillRect(0, 0, w, h);
  const hx = w * 0.35, hy = h * 0.5;
  ctx.fillStyle = `rgba(15,15,15,${0.5})`;
  ctx.beginPath();
  ctx.ellipse(hx, hy, 22, 14, 0.2, 0, Math.PI * 2);
  ctx.fill();
  for (let i = 0; i < 4; i++) {
    ctx.fillRect(hx + 17 + i * 7, hy - 9 + Math.sin(i) * 5, 6, 16);
  }
  ctx.strokeStyle = `rgba(220,220,210,${0.1})`;
  ctx.lineWidth = 1.5;
  ctx.beginPath();
  ctx.ellipse(hx + 12, hy - 14, 9, 16, 0.1, 0, Math.PI * 2);
  ctx.stroke();
  ctx.fillStyle = `rgba(220,180,160,${0.025})`;
  ctx.beginPath();
  ctx.ellipse(hx + 2, hy, 18, 10, 0.2, 0, Math.PI * 2);
  ctx.fill();
}

function renderMontageSilhouette(ctx, t) {
  const w = W, h = H;
  ctx.fillStyle = '#0a050a';
  ctx.fillRect(0, 0, w, h);
  const cx = w * 0.5, cy = h * 0.48;
  // Person K (left)
  ctx.fillStyle = 'rgba(10,10,12,0.65)';
  ctx.fillRect(cx - 38, cy - 38, 22, 42);
  ctx.beginPath();
  ctx.arc(cx - 27, cy - 45, 9, 0, Math.PI * 2);
  ctx.fill();
  // Person L (right)
  ctx.fillStyle = 'rgba(10,10,12,0.65)';
  ctx.fillRect(cx + 16, cy - 35, 20, 40);
  ctx.beginPath();
  ctx.arc(cx + 26, cy - 42, 8.5, 0, Math.PI * 2);
  ctx.fill();
  // Red rim light between them
  const rim = ctx.createRadialGradient(cx, cy - 20, 0, cx, cy - 20, w*0.08);
  rim.addColorStop(0, `rgba(196,32,32,${0.05})`);
  rim.addColorStop(0.5, `rgba(139,26,26,${0.02})`);
  rim.addColorStop(1, 'rgba(0,0,0,0)');
  ctx.fillStyle = rim;
  ctx.fillRect(cx - w*0.08, cy - 60, w*0.16, 80);
}

// ════════════════════════════════════════════════════════════════
// SCENE 6: 18-20s — REVEAL
// ════════════════════════════════════════════════════════════════

function renderReveal(ctx, t, dt) {
  const w = W, h = H;
  const p = sceneProgress(t, 'reveal');

  // Pure black
  ctx.fillStyle = '#000000';
  ctx.fillRect(0, 0, w, h);

  // Show text overlay via CSS
  const dateEl = document.getElementById('dateContainer');
  const brandEl = document.getElementById('brandTag');
  const bottomEl = document.getElementById('bottomTag');

  if (p > 0.05) {
    dateEl.classList.add('visible');
  }
  if (p > 0.25) {
    brandEl.classList.add('visible');
    bottomEl.classList.add('visible');
  }

  // Subtle red glow rising behind text
  if (p > 0.1) {
    const glowAlpha = (p - 0.1) / 0.9 * 0.035;
    const glow = ctx.createRadialGradient(w*0.5, h*0.42, 0, w*0.5, h*0.42, w*0.35);
    glow.addColorStop(0, `rgba(139,26,26,${glowAlpha})`);
    glow.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.fillStyle = glow;
    ctx.fillRect(0, 0, w, h);
  }

  // Last deep pulse at ~19s
  if (t > 18.7 && t < 19.3) {
    const flash = Math.sin((t - 18.7) / 0.6 * Math.PI);
    ctx.fillStyle = `rgba(196,32,32,${flash * 0.04})`;
    ctx.fillRect(0, 0, w, h);
  }

  // Final fade to black (19.5s onward)
  if (t > 19.5) {
    const fadeAlpha = (t - 19.5) / 0.5;
    ctx.fillStyle = `rgba(0,0,0,${fadeAlpha * 0.7})`;
    ctx.fillRect(0, 0, w, h);
  }
}

// ════════════════════════════════════════════════════════════════
// FX CANVAS — Light leaks, lens flares, atmospheric effects
// ════════════════════════════════════════════════════════════════

function renderFX(ctx, t, dt) {
  const w = W, h = H;
  ctx.clearRect(0, 0, w, h);

  const scene = getScene(t);

  // Light leaks — drifting red flares
  for (let i = 0; i < 2; i++) {
    const seed = i * 73.7 + t * 0.2;
    const lx = (Math.sin(seed) * 0.5 + 0.5) * w;
    const ly = (Math.cos(seed * 1.4 + 0.5) * 0.5 + 0.5) * h;
    const leakSize = w * (0.15 + Math.sin(seed * 0.7) * 0.05);
    const leak = ctx.createRadialGradient(lx, ly, 0, lx, ly, leakSize);
    const leakAlpha = 0.008 + Math.sin(seed * 2) * 0.004;
    leak.addColorStop(0, `rgba(196,32,32,${leakAlpha})`);
    leak.addColorStop(0.6, `rgba(139,26,26,${leakAlpha * 0.3})`);
    leak.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.fillStyle = leak;
    ctx.fillRect(0, 0, w, h);
  }

  // Lens flare (subtle) — only in city scenes
  if (scene === 'cdmx' || scene === 'tokyo' || scene === 'guangzhou') {
    const flareX = w * 0.2 + Math.sin(t * 0.1) * w * 0.1;
    const flareY = h * 0.3;
    const flare = ctx.createRadialGradient(flareX, flareY, 0, flareX, flareY, w*0.02);
    flare.addColorStop(0, `rgba(255,200,150,${0.005})`);
    flare.addColorStop(0.5, `rgba(196,32,32,${0.002})`);
    flare.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.fillStyle = flare;
    ctx.fillRect(flareX - w*0.05, flareY - w*0.05, w*0.1, w*0.1);

    // Flare streak
    ctx.fillStyle = `rgba(255,220,200,${0.003})`;
    ctx.fillRect(flareX - w*0.08, flareY, w*0.16, 0.5);
  }

  // Film breath (subtle brightness shift)
  if (Math.random() < 0.005) {
    ctx.fillStyle = `rgba(255,255,255,${Math.random() * 0.03})`;
    ctx.fillRect(0, 0, w, h);
  }

  // Red vignette pulse on beats (during Guangzhou)
  if (scene === 'guangzhou') {
    const beatPhase = (t % 0.469) / 0.469;
    if (beatPhase < 0.05) {
      ctx.fillStyle = `rgba(139,26,26,${(1 - beatPhase/0.05) * 0.005})`;
      ctx.fillRect(0, 0, w, h);
    }
  }
}

// ════════════════════════════════════════════════════════════════
// VIDEO EXPORT (MediaRecorder)
// ════════════════════════════════════════════════════════════════
let mediaRecorder = null;
let recordedChunks = [];
let isRecording = false;

const exportBtn = document.getElementById('exportBtn');

// Show export button after first play
let exportBtnShown = false;
function showExportBtn() {
  if (!exportBtnShown) {
    exportBtnShown = true;
    setTimeout(() => exportBtn.classList.add('visible'), 2000);
  }
}

exportBtn.addEventListener('click', function() {
  if (isRecording) return;
  startRecording();
});

function startRecording() {
  // Capture scene canvas stream at 24fps
  const stream = canvas.captureStream(24);
  recordedChunks = [];

  // Try preferred codecs
  const mimeTypes = [
    'video/webm;codecs=vp9',
    'video/webm;codecs=vp8',
    'video/webm',
    'video/mp4'
  ];

  let mimeType = '';
  for (const mt of mimeTypes) {
    if (MediaRecorder.isTypeSupported(mt)) {
      mimeType = mt;
      break;
    }
  }

  if (!mimeType) {
    exportBtn.textContent = 'export not supported';
    return;
  }

  try {
    mediaRecorder = new MediaRecorder(stream, { mimeType });
  } catch(e) {
    exportBtn.textContent = 'recorder failed';
    return;
  }

  isRecording = true;
  exportBtn.textContent = '● recording 20s';
  exportBtn.classList.add('recording');

  mediaRecorder.ondataavailable = function(e) {
    if (e.data.size > 0) recordedChunks.push(e.data);
  };

  mediaRecorder.onstop = function() {
    isRecording = false;
    exportBtn.classList.remove('recording');
    exportBtn.classList.add('done');
    exportBtn.textContent = '✓ download video';

    // Create blob and download link
    const blob = new Blob(recordedChunks, { type: mimeType });
    const url = URL.createObjectURL(blob);
    const ext = mimeType.includes('mp4') ? 'mp4' : 'webm';
    const a = document.createElement('a');
    a.href = url;
    a.download = `velvet-rouge-teaser.${ext}`;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);

    // Reset button after 5s
    setTimeout(() => {
      exportBtn.classList.remove('done');
      exportBtn.textContent = 'export video';
    }, 5000);
  };

  // Wait for next loop start to begin recording a clean 20s cycle
  // We detect the loop by watching startTime reset
  const checkLoop = setInterval(() => {
    if (startTime === null && isRecording) {
      clearInterval(checkLoop);
      // Next frame will set startTime
      setTimeout(() => {
        // Start recording
        mediaRecorder.start(100); // collect data every 100ms
        // Stop after 20s + 2.5s hold + margin
        setTimeout(() => {
          if (mediaRecorder && mediaRecorder.state === 'recording') {
            mediaRecorder.stop();
          }
        }, 23000); // 20s + 2.5s hold + 0.5s margin
      }, 50);
    }
  }, 100);

  // Safety timeout if loop never resets
  setTimeout(() => {
    if (isRecording && mediaRecorder && mediaRecorder.state === 'recording') {
      mediaRecorder.stop();
    }
  }, 25000);
}

// ════════════════════════════════════════════════════════════════
// MAIN LOOP
// ════════════════════════════════════════════════════════════════
let renderLoopActive = false;
let audioFadeDone = false;
let loopHoldTimer = null;

function render(timestamp) {
  if (!startTime) startTime = timestamp;
  const elapsed = (timestamp - startTime) / 1000;
  const t = Math.min(elapsed, DURATION);
  const dt = 1 / FPS;

  const scene = getScene(t);

  // Clear canvas
  ctx.clearRect(0, 0, W, H);

  // Render scene
  switch (scene) {
    case 'velvet':    renderVelvet(ctx, t, dt); break;
    case 'cdmx':      renderCDMX(ctx, t, dt); break;
    case 'tokyo':     renderTokyo(ctx, t, dt); break;
    case 'guangzhou': renderGuangzhou(ctx, t, dt); break;
    case 'montage':   renderMontage(ctx, t, dt); break;
    case 'reveal':    renderReveal(ctx, t, dt); break;
  }

  // FX overlay
  renderFX(fxCtx, t, dt);

  // Reset text overlays when not in reveal/montage
  const textVisible = scene === 'reveal';
  if (!textVisible) {
    document.getElementById('dateContainer').classList.remove('visible');
    document.getElementById('bottomTag').classList.remove('visible');
  }

  // Brand tag visible during city scenes
  const brandVisible = scene === 'cdmx' || scene === 'tokyo' || scene === 'guangzhou' || scene === 'montage';
  document.getElementById('brandTag').classList.toggle('visible', brandVisible);

  // Audio fade at end (last 0.5s)
  if (t >= DURATION - 0.5 && audioStarted && !audioFadeDone) {
    audioFadeDone = true;
    fadeAudioOut(0.5);
  }

  // Loop
  if (t < DURATION) {
    requestAnimationFrame(render);
  } else {
    loopCount++;
    // Hold final frame, then restart with audio seeking for seamless loop
    loopHoldTimer = setTimeout(() => {
      startTime = null;
      audioFadeDone = false;
      if (audioStarted && ytPlayer && ytPlayer.playVideo) {
        resetAudioForLoop();
      }
      requestAnimationFrame(render);
    }, 2500);
  }
}

// ─── YouTube ready check for pending play ───
const ytCheckInterval = setInterval(() => {
  if (ytReady && pendingPlay) {
    pendingPlay = false;
    startAudio();
    clearInterval(ytCheckInterval);
  }
  if (ytReady) clearInterval(ytCheckInterval);
}, 200);

// ─── Start (waiting for user tap) ───
loadYouTubeAPI();
renderLoopActive = false;
</script>
